[exchange]
name = "bybit"
api_key = ""
api_secret = ""
paper_trading = true

[strategy]
name = "pairs"
symbols = ["BTCUSDT", "ETHUSDT"]
timeframe = "1h"

[strategy.params]
lookback_period = 60.0
entry_z_score = 2.0
exit_z_score = 0.5

[risk]
max_position_size = 1000.0
max_drawdown_pct = 0.1
stop_loss_pct = 0.02
take_profit_pct = 0.05
max_open_positions = 3

[database]
path = "data/trading.db"

[monitoring]
enabled = false
